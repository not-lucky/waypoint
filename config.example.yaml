# Waypoint Configuration Example File (config.example.yaml)
# This file contains all the possible fields and configurations supported by Waypoint.

gateway:
  # Port the proxy server will listen on (required, positive integer)
  port: 20128

  # Maximum number of retry attempts for failed upstream calls (optional, positive integer)
  globalRetryLimit: 3

  # Gateway-level request timeout in milliseconds before failing the client (optional, positive integer).
  # This sets the MAXIMUM DURATION a single upstream request can take before Waypoint aborts it.
  # This differs from client rate limits (below), which control the frequency of requests over time.
  httpTimeoutMs: 120000

  # Cooldown settings for tiered key lifecycle (optional).
  # When a key fails upstream, Waypoint puts it in cooldown for a tier-specific
  # duration instead of exhausting it. The key auto-reactivates when the timer
  # expires.
  cooldown:
    # T3 — Rate limit (RPM/TPM/concurrent 429).
    # Starting delay, in seconds, used as the base of the exponential backoff
    # when Retry-After is absent: backoff = baseSeconds * 2^consecutiveFailures.
    baseSeconds: 30
    # T3 — Rate limit (RPM/TPM/concurrent 429).
    # Hard cap, in seconds, for the exponential backoff above (default 1 hour).
    maxSeconds: 3600
    # T1 — Billing recovery (HTTP 402, insufficient_quota, billing hard limit,
    # and quota-style 429 such as daily_tokens_exceeded).
    # Cooldown applied to a key that hit a billing/quota wall. Overridden by
    # Retry-After if the upstream provides a longer value.
    billingSeconds: 3600
    # T2 — Permission recovery (HTTP 403, fixable 401 such as region_not_supported,
    # org_membership_required, ip_not_supported).
    # Cooldown for keys blocked by authorization/region/org issues that may clear
    # on their own. Overridden by Retry-After if the upstream provides a longer value.
    permissionSeconds: 1800
    # T4 — Transient server errors (HTTP 500/502/503/504, engine_overloaded, etc.).
    # Default cooldown for transient upstream failures when Retry-After is absent.
    # Short by design; these errors usually clear quickly.
    serverSeconds: 60
    # T4b — OpenAI "Slow Down" / rate_reduction_required (HTTP 503 with the
    # slow-down message). Effective cooldown is max(retryAfterSeconds, slowDownMinimumSeconds),
    # so this value is a floor that prevents over-aggressive retries even when
    # Retry-After is short. Default 15 minutes.
    slowDownMinimumSeconds: 900

  # Maximum allowed payload size for requests (optional string)
  maxPayloadSize: "10mb"

  # Routing configuration (optional)
  routing:
    # Supported strategies:
    # - "round-robin": Sequential key rotation per request. Distributes load evenly
    #   across all active keys. Best general-purpose default.
    # - "fill-first": Exhausts primary key quota entirely before rotating to the next.
    #   Best when prompt cache locality matters more than RPM distribution.
    strategy: "round-robin"

  # CORS configuration (optional)
  cors:
    allowedOrigins:
      - "*"

logging:
  # Enable console logging output (required boolean)
  enableConsole: true

  # Enable logging to a file (required boolean)
  enableFile: true

  # File path to output logs (required if enableFile is true)
  filePath: "./logs/Waypoint.log"

  # Log format structure: "json" | "text" (required)
  format: "json"

  # Log level limit: "debug" | "info" | "warning" | "error" | "fatal" (optional, default: "info")
  level: "info"

  # Enable per-request debug logging (optional, default: false)
  # When enabled, creates a timestamped folder per request under requestLogPath
  # containing separate log files for each stage of the request lifecycle:
  #   01_client_request.json   - Raw incoming HTTP request (headers redacted)
  #   02_provider_request.json - Transformed request sent to the upstream provider
  #   03_provider_response.json - Response received from the provider
  #   04_client_response.json  - Final response sent back to the client
  #   05_event_stream.jsonl    - SSE events for streaming requests (both directions)
  logRequests: false

  # Directory for per-request debug folders (optional, default: "./logs/requests")
  requestLogPath: "./logs/requests"

clients:
  # At least one client is required
  - name: "open-webui"
    # The Bearer token the client uses to authenticate. Environment variables are supported via ${VAR_NAME} (required)
    token: "${OPEN_WEBUI_TOKEN}"
    # Rate limit configuration (optional).
    # This controls the FREQUENCY of requests allowed from this client to prevent abuse.
    # It does NOT affect the duration of a single request (that is handled by gateway.httpTimeoutMs).
    rateLimit:
      # The time window in milliseconds (required, positive integer)
      # e.g., 60000 = 1 minute window.
      windowMs: 60000
      # Maximum requests this client is allowed to make within the windowMs (required, positive integer)
      # e.g., 100 requests every 60 seconds.
      max: 100
  - name: "codex-agent"
    token: "${CODEX_AGENT_TOKEN}"
    rateLimit:
      windowMs: 60000
      max: 30

# Providers definition (required, at least one provider must be defined)
# Reserved provider names: gemini, anthropic, openai
# These are built-in providers with known upstream endpoints and do NOT require a baseUrl.
# Reserved providers must NOT carry a 'type' field — it is ignored with a warning if present.
#
# Custom providers MUST specify a baseUrl.
# Custom providers support an optional 'type' field:
#   - Omitting 'type' is identical to type: "openai-compatible" (the default).
#   - The only other accepted value is "anthropic-compatible".
providers:
  gemini:
    # API keys pool. Environment variables are supported via ${VAR_NAME} (required, array of strings)
    keys:
      - "${GEMINI_API_KEY_1}"
      - "${GEMINI_API_KEY_2}"
    # Models array (required)
    models:
      - id: "gemini-2.5-pro-preview-05-06"              # The model ID exposed by the gateway (required, string)
        aliases: ["gemini-2.5-pro", "gemini-pro", "pro"] # Alternative IDs to match this model (optional, array of strings)
        reasoningSupported: true                       # Whether the model supports reasoning/thinking (optional, boolean)
        fallbackModel: "openai/gpt-4o"                 # Model to use if all keys for this provider fail (optional format: provider/model-id)
      - id: "gemini-flash-lite-latest-low"
        actualModelId: "gemini-flash-lite-latest"     # The underlying model to call upstream (optional, string)
        reasoningSupported: true                       # Whether reasoning is supported (optional, boolean)
        temperature: 0.3                                # Default parameters applied if not specified by client (optional)
        maxTokens: 4096                                 # Default parameters applied if not specified by client (optional)
        reasoningEffort: "low"                         # Unified reasoning level: minimal | low | medium | high | xhigh | max
      - id: "gemini-flash-lite-latest-high"
        actualModelId: "gemini-flash-lite-latest"
        reasoningSupported: true
        overrides:                                      # Locked settings that ignore/override client-supplied values or headers (optional, object)
          reasoningEffort: "high"
          temperature: 0.8
          maxTokens: 8192
      - id: "gemini-2.0-flash"
        aliases: ["flash"]
        reasoningSupported: false

  anthropic:
    keys:
      - "${ANTHROPIC_API_KEY_1}"
    models:
      - id: "claude-sonnet-4-20250514"
        aliases: ["claude-sonnet-4", "sonnet"]
        reasoningSupported: true
        reasoningEffort: "medium"
        fallbackModel: "gemini/gemini-2.5-pro-preview-05-06"

  openai:
    keys:
      - "${OPENAI_API_KEY_1}"
    models:
      - id: "gpt-4o"
        aliases: ["gpt4"]
        reasoningSupported: false

  # Custom OpenAI-compatible provider example
  custom-openai:
    type: "openai-compatible"                     # Defaults to openai-compatible if omitted
    baseUrl: "https://api.openai.com/v1"         # Required for custom providers
    keys:
      - "${OPENAI_API_KEY_1}"
    models:
      - id: "gpt-4o"
        aliases: ["custom-gpt"]
        reasoningSupported: false

  # Custom Anthropic-compatible provider example
  custom-anthropic:
    type: "anthropic-compatible"                  # Explicit type for Anthropic compatible endpoints
    baseUrl: "https://api.anthropic.com/v1"
    keys:
      - "${ANTHROPIC_API_KEY_1}"
    models:
      - id: "claude-sonnet-4"
        aliases: ["custom-sonnet"]
        reasoningSupported: true
        reasoningEffort: "high"

  # Requesty Anthropic-compatible example
  requesty:
    type: "anthropic-compatible"
    baseUrl: "https://router.requesty.ai/v1"
    keys:
      - "${REQUESTY_API_KEY_1}"
    models:
      - id: "nebius/nvidia/nemotron-3-nano-omni"
        reasoningSupported: true

  # Local or self-hosted provider example (e.g. Ollama)
  local-ollama:
    baseUrl: "http://localhost:11434/v1"
    keys:
      - "dummy-key-required-but-unused"           # A key is required even if unused by the endpoint
    models:
      - id: "llama3:70b"
        aliases: ["llama3"]
        reasoningSupported: false
