# Waypoint Configuration Example File (config.example.yml)
# This file contains all the possible fields and configurations supported by Waypoint.

gateway:
  # Port the proxy server will listen on
  port: 20128
  # Maximum number of retry attempts for failed upstream calls
  global_retry_limit: 3
  # Cooldown settings for rate-limiting exponential backoff
  cooldown:
    base_seconds: 30       # Base cooldown for rate-limit exponential backoff
    max_seconds: 3600      # Cap for exponential backoff cooldowns (1 hour)
  # Maximum allowed payload size for requests
  max_payload_size: "10mb"
  routing:
    # Supported strategies:
    # - "round-robin": Sequential key rotation per request. Distributes load evenly
    #   across all active keys.
    # - "fill-first": Exhausts primary key quota entirely before rotating to the next.
    strategy: "round-robin"
  cors:
    allowed_origins:
      - "*"

logging:
  # Enable console logging output
  enable_console: true
  # Enable logging to a file
  enable_file: true
  # File path to output logs (required if enable_file is true)
  file_path: "./logs/Waypoint.log"
  # Log format structure: "json" | "text"
  format: "json"

clients:
  - name: "open-webui"
    token: "${OPEN_WEBUI_TOKEN}"
    rate_limit:
      window_ms: 60000
      max: 100
  - name: "codex-agent"
    token: "${CODEX_AGENT_TOKEN}"
    rate_limit:
      window_ms: 60000
      max: 30

# Providers definition
# Reserved provider names: gemini, anthropic, openai
# These use Vercel AI SDK provider packages and do NOT require a base_url.
#
# Custom providers MUST specify a base_url and support an optional 'type' field:
#   - Omitting 'type' is identical to type: "openai-compatible" (the default).
#   - The only other accepted value is "anthropic-compatible".
providers:
  gemini:
    keys:
      - "${GEMINI_API_KEY_1}"
      - "${GEMINI_API_KEY_2}"
    models:
      - id: "gemini-2.5-pro"
        aliases: ["gemini-pro", "pro"]
        actual_model_id: "gemini-2.5-pro-preview-05-06"
        thinking_supported: true
        default_thinking_budget: 2048
        fallback_model: "openai/gpt-4o"
      - id: "gemini-2.0-flash"
        aliases: ["flash"]
        actual_model_id: "gemini-2.0-flash"
        thinking_supported: false

  anthropic:
    keys:
      - "${ANTHROPIC_API_KEY_1}"
    models:
      - id: "claude-sonnet-4"
        aliases: ["sonnet"]
        actual_model_id: "claude-sonnet-4-20250514"
        thinking_supported: true
        default_thinking_budget: 4096
        fallback_model: "gemini/gemini-2.5-pro"

  openai:
    keys:
      - "${OPENAI_API_KEY_1}"
    models:
      - id: "gpt-4o"
        aliases: ["gpt4"]
        actual_model_id: "gpt-4o"
        thinking_supported: false

  # Custom OpenAI-compatible provider
  custom-openai:
    type: "openai-compatible"
    base_url: "https://api.openai.com/v1"
    keys:
      - "${OPENAI_API_KEY_1}"
    models:
      - id: "custom-gpt"
        actual_model_id: "gpt-4o"
        thinking_supported: false

  # Custom Anthropic-compatible provider
  custom-anthropic:
    type: "anthropic-compatible"
    base_url: "https://api.anthropic.com/v1"
    keys:
      - "${ANTHROPIC_API_KEY_1}"
    models:
      - id: "custom-sonnet"
        actual_model_id: "claude-sonnet-4"
        thinking_supported: false
