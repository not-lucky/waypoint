gateway:
  port: 20128
  global_retry_limit: 3
  cooldown:
    base_seconds: 30       # Base cooldown for rate-limit exponential backoff
    max_seconds: 3600      # Cap for exponential backoff cooldowns (1 hour)
  max_payload_size: "10mb"
  routing:
    # Supported strategies:
    # - "round-robin": Sequential key rotation per request. Distributes load evenly
    #   across all active keys. Best general-purpose default.
    # - "fill-first": Exhausts primary key quota entirely before rotating to the next.
    #   Best when prompt cache locality matters more than RPM distribution.
    strategy: "round-robin"
  cors:
    allowed_origins: ["*"]

logging:
  enable_console: true
  enable_file: true
  file_path: "./logs/Waypoint.log"
  format: "text" # Supported: "json" | "text"

  # Log level limit: "debug" | "info" | "warning" | "error" | "fatal" (optional, default: "info")
  level: "debug"

  # Enable per-request debug logging (optional, default: false)
  # When enabled, creates a timestamped folder per request under request_log_path
  # containing separate log files for each stage of the request lifecycle:
  #   01_client_request.json   - Raw incoming HTTP request (headers redacted)
  #   02_provider_request.json - Transformed request sent to the upstream provider
  #   03_provider_response.json - Response received from the provider
  #   04_client_response.json  - Final response sent back to the client
  #   05_event_stream.jsonl    - SSE events for streaming requests (both directions)
  log_requests: true

  # Directory for per-request debug folders (optional, default: "./logs/requests")
  request_log_path: "./logs/requests"

clients:
  - name: "open-webui"
    token: "${OPEN_WEBUI_TOKEN}"
    rate_limit:
      window_ms: 60000
      max: 100
  - name: "codex-agent"
    token: "${CODEX_AGENT_TOKEN}"
    rate_limit:
      window_ms: 60000
      max: 30

# Reserved provider names: gemini, anthropic, openai
# These use Vercel AI SDK provider packages and do NOT require a base_url.
# Reserved providers must NOT carry a 'type' field — it is ignored with a warning if present.
#
# Custom providers MUST specify a base_url.
# Custom providers support an optional 'type' field:
#   - Omitting 'type' is identical to type: "openai-compatible" (the default).
#   - The only other accepted value is "anthropic-compatible".
providers:
  gemini:
    keys:
      - "${GEMINI_API_KEY_1}"
    models:
      - id: "gemini-2.5-pro"
        aliases: ["gemini-pro", "pro"]
        actual_model_id: "gemini-2.5-pro-preview-05-06"
        thinking_supported: true
        default_thinking_budget: 2048
        fallback_model: "openai/gpt-4o"
      - id: "gemini-flash-latest"
        aliases: ["flash-latest"]
        actual_model_id: "gemini-flash-latest"
        thinking_supported: true
        default_thinking_budget: 10240

  anthropic:
    keys:
      - "${ANTHROPIC_API_KEY_1}"
    models:
      - id: "claude-sonnet-4"
        aliases: ["sonnet"]
        actual_model_id: "claude-sonnet-4-20250514"
        thinking_supported: true
        default_thinking_budget: 4096
        fallback_model: "gemini/gemini-2.5-pro"

  openai:
    keys:
      - "${OPENAI_API_KEY_1}"
    models:
      - id: "gpt-4o"
        aliases: ["gpt4"]
        actual_model_id: "gpt-4o"
        thinking_supported: false

  omniroute:
    base_url: "https://omniroute.notlucky.dedyn.io/v1"
    keys:
      - "${OMNIROUTE_API}"
    models:
      - id: "gemini/gemini-flash-lite-latest"
        actual_model_id: "gemini/gemini-flash-lite-latest"
        thinking_supported: true
  hapuppy:
    base_url: "${HAPPY_URL}"
    keys:
      - "${HAPPY_API}"
    models:
      - id: "gpt-oss-20b"
        actual_model_id: "gpt-oss-20b"
        thinking_supported: false
  gemini_openai_comp:
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    keys:
      - "${GEMINI_API_KEY_1}"
    models:
      - id: "gemini-latest"
        actual_model_id: "gemini-flash-lite-latest"
        thinking_supported: true
        default_thinking_budget: 10240


  # Example custom provider (type defaults to "openai-compatible" when omitted):
  # my-ollama:
  #   base_url: "http://localhost:11434/v1"
  #   keys:
  #     - "ollama"   # Ollama doesn't need real keys, but the field is required
  #   models:
  #     - id: "llama3"
  #       actual_model_id: "llama3:70b"
  #       thinking_supported: false

  # Example custom provider with explicit type: "anthropic-compatible":
