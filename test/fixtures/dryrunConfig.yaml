gateway:
  port: 20129
  globalRetryLimit: 3
  routing:
    strategy: "round-robin"
  cors:
    allowedOrigins:
      - "*"

logging:
  enableConsole: false
  enableFile: false
  format: "json"
  logRequests: true
  requestLogPath: "./logs/dryrun-requests"

clients:
  - name: "open-webui"
    token: "mock-webui-token"
    rateLimit:
      windowMs: 60000
      max: 100

providers:
  gemini:
    keys:
      - "gemini-key"
    models:
      - id: "gemini-2.5-pro-preview-05-06"
        aliases: ["gemini-pro"]
  anthropic:
    keys:
      - "anthropic-key"
    models:
      - id: "claude-sonnet-4"
        aliases: ["sonnet"]
  openai:
    keys:
      - "openai-key"
    models:
      - id: "gpt-4o"
        aliases: ["gpt4"]
